<form (ngSubmit)="OnCalculateClicked()" >
    <div class="input-group">
        <p>
            <label for="initialInvestment">Initial Investment</label>
            <input type="number" id="initialInvestment" [(ngModel)]="initialInvestment" name="initialInvestment" required>
        </p>

        <p>
            <label for="annualContribution">Annual Contribution</label>
            <input type="number" id="annualContribution" [(ngModel)]="annualContribution" name="annualContribution" required>
        </p>
    </div>
    
    <div class="input-group">
        <p>
            <label for="expectedReturn">Expected Return (%)</label>
            <input type="number" id="expectedReturn" [(ngModel)]="expectedReturn" name="expectedReturn" required>
        </p>

        <p>
            <label for="investmentDuration">Investment Duration (years)</label>
            <input type="number" id="investmentDuration" [(ngModel)]="investmentDuration" name="investmentDuration" required>
        </p>
    </div>
    
    <button type="submit">Calculate</button>
</form>
